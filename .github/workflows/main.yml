name: CI - Automation Testing (UI Web)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget

          CHROMEDRIVER_VERSION="147.0.7727.57"

          wget -q --continue -P /tmp "https://storage.googleapis.com/chrome-for-testing-public/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip" || {
            echo "Fallback download..."
            wget -q -P /tmp "https://chromedriver.storage.googleapis.com/145.0.7632.160/chromedriver_linux64.zip" || exit 1
          }

          unzip /tmp/chromedriver-linux64.zip -d /tmp || unzip /tmp/chromedriver_linux64.zip -d /tmp
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver || sudo mv /tmp/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Debug Chrome & Driver
        run: |
          google-chrome --version
          chromedriver --version
          which chromedriver

      # 🔥 RUN TEST + GENERATE CUCUMBER REPORT
      - name: Run UI Tests + Generate Cucumber Report
        run: ./gradlew clean test generateCucumberReport

      # 🔍 DEBUG (biar keliatan struktur file)
      - name: Debug report files
        if: always()
        run: |
          echo "Isi folder build:"
          ls -R build || echo "Folder build tidak ada"

      # 📦 UPLOAD HTML REPORT (MASTERTHOUGHT)
      - name: Upload Cucumber HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: build/cucumber-report/html
          retention-days: 30

      # 📄 GENERATE PDF DARI REPORT (STABIL)
      - name: Generate PDF from Cucumber Report
        if: always()
        run: |
          if [ -f build/cucumber-report/html/index.html ]; then
            mkdir -p build/cucumber-report/pdf
            cd build/cucumber-report/html

            # Jalankan server lokal
            python3 -m http.server 8000 &
            sleep 2

            # Convert ke PDF
            google-chrome --headless --disable-gpu --no-sandbox \
              --print-to-pdf="$(pwd)/../pdf/Cucumber_Report.pdf" \
              "http://localhost:8000/index.html"

          else
            echo "Report tidak ditemukan, skip PDF"
          fi

      # 📦 UPLOAD PDF
      - name: Upload Cucumber PDF Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-pdf-report
          path: build/cucumber-report/pdf
          retention-days: 30

      # 📦 UPLOAD JUNIT RESULT
      - name: Upload Test Results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: build/test-results/test/
