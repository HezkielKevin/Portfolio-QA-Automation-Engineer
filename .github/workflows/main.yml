name: CI - Automation Testing (UI Web)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget

          CHROMEDRIVER_VERSION="147.0.7727.57"

          wget -q --continue -P /tmp "https://storage.googleapis.com/chrome-for-testing-public/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip" || {
            echo "Fallback download..."
            wget -q -P /tmp "https://chromedriver.storage.googleapis.com/145.0.7632.160/chromedriver_linux64.zip" || exit 1
          }

          unzip /tmp/chromedriver-linux64.zip -d /tmp || unzip /tmp/chromedriver_linux64.zip -d /tmp
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver || sudo mv /tmp/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Debug Chrome & Driver
        run: |
          google-chrome --version
          chromedriver --version
          which chromedriver

      - name: Run UI Tests
        run: ./gradlew clean test -Dheadless=true

      # - name: Debug report files
      #   if: always()
      #   run: |
      #     echo "Isi folder build/reports:"
      #     ls -R build || echo "Folder build tidak ada"

      - name: Ensure Cucumber Report Exists
        if: always()
        run: |
          for i in {1..20}; do
            if [ -f build/reports/tests/test/index.html ]; then
              echo "Report ditemukan"
              exit 0
            fi
            echo "Menunggu report... ($i/20)"
            sleep 0.5
          done

          echo "ERROR: Cucumber HTML report tidak ditemukan!"
          exit 1

      # - name: Upload Cucumber HTML Report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: cucumber-html-report
      #     path: build/reports/tests/test
      #     retention-days: 20

      - name: Generate PDF from HTML Report
        if: always()
        run: |
          if [ -f build/reports/tests/test/index.html ]; then
            mkdir -p build/reports/tests/test/pdf
      
            cd build/reports/tests/test
      
            # jalankan server lokal
            python3 -m http.server 8000 &
            sleep 2
      
            # generate PDF dari HTTP (bukan file://)
            google-chrome --headless --disable-gpu --no-sandbox \
              --print-to-pdf="$(pwd)/pdf/Github_Test_Report.pdf" \
              "http://localhost:8000/index.html"
      
          else
            echo "ERROR: HTML report tidak ditemukan!"
            exit 1
          fi
          
      # - name: Generate PDF from HTML Report
      #   if: always()
      #   run: |
      #     if [ -f build/reports/tests/test/index.html ]; then
      #       cd build/reports/tests/test
      
      #       python3 -m http.server 8000 &
      #       sleep 2
      
      #       google-chrome --headless --disable-gpu --no-sandbox \
      #         --print-to-pdf="$(pwd)/../Github_Test_Report.pdf" \
      #         "http://localhost:8000/index.html"
      #     else
      #       echo "Skip PDF generation karena HTML tidak ada"
      #     fi
          
      - name: Upload Report PDF dan HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automated-Testing-Report
          path: build/reports/tests/test
          retention-days: 20

      - name: Upload Test Results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: build/test-results/test/
