name: CI - Automation Testing (UI Web)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (Official & Stable)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      # - name: Install Microsoft Edge
      #   uses: browser-actions/setup-edge@latest

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          
      - name: Install ChromeDriver
        run: |
          # Install dependencies
          sudo apt-get update
          sudo apt-get install -y unzip wget

          # Ambil major.minor.build dari Chrome 
          CHROME_MAJOR=145
          CHROMEDRIVER_VERSION="145.0.7632.160"

          echo "Menggunakan ChromeDriver versi: $CHROMEDRIVER_VERSION"

          wget -q --continue -P /tmp "https://storage.googleapis.com/chrome-for-testing-public/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip" || {
            echo "Gagal download dari CfT, coba fallback..."
            # Fallback kalau CfT belum update 145 full
            wget -q -P /tmp "https://chromedriver.storage.googleapis.com/145.0.7632.160/chromedriver_linux64.zip" || exit 1
          }

          unzip /tmp/chromedriver-linux64.zip -d /tmp  # nama zip CfT: chromedriver-linux64.zip, extract chromedriver
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Debug Chrome & Driver
        run: |
          google-chrome --version
          chromedriver --version
          which chromedriver

      - name: Run UI Tests
        run: ./gradlew clean test -Dheadless=true

      - name: Wait & Upload Cucumber HTML Report
        if: always()
        run: |
          # Tunggu sampai report pasti muncul (max 10 detik)
          for i in {1..20}; do
            if [ -f build/reports/cucumber/html/index.html ]; then
              echo "Laporan Cucumber ditemukan!"
              break
            fi
            echo "Menunggu laporan... ($i/20)"
            sleep 0.5
          done
          echo "Upload artifact report..."
        shell: bash

      - name: Upload Cucumber HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: build/reports/cucumber/html/
          retention-days: 30

      - name: Upload Test Results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: build/test-results/test/
