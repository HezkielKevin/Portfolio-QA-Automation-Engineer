name: CI - Automation Testing (UI Web)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (Official Latest Action)
        uses: gradle/actions/setup-gradle@v4  # Versi terbaru (ganti dari gradle-build-action)

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Chrome Browser
        uses: browser-actions/setup-chrome@latest
        id: setup-chrome

      - name: Verify Chrome Installation
        run: |
          echo "Chrome version: ${{ steps.setup-chrome.outputs.chrome-version }}"
          google-chrome --version

      - name: Run UI Tests (Headless Mode)
        run: ./gradlew clean test -Dheadless=true

      - name: Upload Cucumber HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: build/reports/cucumber/html/
          retention-days: 30

      - name: Upload JUnit Report (Bonus)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/test-results/test/
