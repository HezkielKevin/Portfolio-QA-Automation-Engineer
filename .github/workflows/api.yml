name: API Automation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run API Tests
        run: ./gradlew clean apiTest

      - name: Upload TestNG API Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-testng-report
          path: build/reports/tests/apiTest/
          retention-days: 30

      - name: Upload API Test Results XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: build/test-results/apiTest/
