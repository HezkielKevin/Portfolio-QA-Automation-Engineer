name: Automation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Chrome Browser
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install ChromeDriver
      run: |
        sudo apt-get install -y unzip
        wget https://storage.googleapis.com/chrome-for-testing-public/131.0.6778.69/linux64/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver

    - name: Run API Tests
      run: ./gradlew runApiTests
      continue-on-error: true

    - name: Run Web UI Tests
      run: ./gradlew runWebTests
      continue-on-error: true

    - name: Generate Masterthought Report
      run: ./gradlew generateCucumberReport
      continue-on-error: true

    - name: Upload Cucumber Reports
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports
        path: |
          build/reports/cucumber/
          build/cucumber-report/html/
