name: Automation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dibutuhkan untuk push ke gh-pages

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Chrome Browser
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable



    - name: Run API Tests
      run: ./gradlew runApiTests
      continue-on-error: true

    - name: Run Web UI Tests
      run: ./gradlew runWebTests
      continue-on-error: true

    - name: Generate Masterthought Report
      run: ./gradlew generateCucumberReport
      continue-on-error: true

    - name: Upload Cucumber Reports
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-reports
        path: |
          build/reports/cucumber/
          build/cucumber-report/html/

    - name: Create index.html for redirect
      if: always()
      run: echo '<meta http-equiv="refresh" content="0; url=cucumber.html" />' > build/reports/cucumber/index.html

    - name: Deploy Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always() # Selalu deploy meskipun ada tes yang gagal
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: build/reports/cucumber/
        keep_files: false
